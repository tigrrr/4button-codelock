blueprint:
  name: Clean 4 Button Keypad
  description: Reliable 4-button keypad with rolling detection and lockout
  domain: automation

  input:

    button_one:
      name: Button 1
      selector:
        entity:
          domain: binary_sensor

    button_two:
      name: Button 2
      selector:
        entity:
          domain: binary_sensor

    button_three:
      name: Button 3
      selector:
        entity:
          domain: binary_sensor

    button_four:
      name: Button 4
      selector:
        entity:
          domain: binary_sensor

    keypad_code:
      name: Unlock code
      default: "1234"
      selector:
        text:

    keypad_buffer:
      name: Buffer helper
      selector:
        entity:
          domain: input_text

    fail_counter:
      name: Fail counter helper
      selector:
        entity:
          domain: input_number

    unlock_output:
      name: Unlock output
      selector:
        entity:
          domain: input_boolean

    unlock_time:
      name: Unlock duration
      default: 10
      selector:
        number:
          min: 1
          max: 120
          step: 1

    lockout_time:
      name: Lockout time
      default: 60
      selector:
        number:
          min: 10
          max: 600
          step: 10

mode: queued
max: 10

trigger:

  - platform: state
    entity_id: !input button_one
    to: "on"
    id: b1

  - platform: state
    entity_id: !input button_two
    to: "on"
    id: b2

  - platform: state
    entity_id: !input button_three
    to: "on"
    id: b3

  - platform: state
    entity_id: !input button_four
    to: "on"
    id: b4


variables:

  buffer_ent: !input keypad_buffer
  fail_ent: !input fail_counter
  code: !input keypad_code

  digit: >
    {% if trigger.id == 'b1' %}1
    {% elif trigger.id == 'b2' %}2
    {% elif trigger.id == 'b3' %}3
    {% elif trigger.id == 'b4' %}4
    {% endif %}

  buffer: "{{ states(buffer_ent) | string }}"
  new_buffer: "{{ (buffer ~ digit)[-20:] }}"
  fails: "{{ states(fail_ent) | int }}"


action:

################################################
# UPDATE BUFFER
################################################

  - service: input_text.set_value
    target:
      entity_id: !input keypad_buffer
    data:
      value: "{{ new_buffer }}"

################################################
# SUCCESS
################################################

  - if:
      - condition: template
        value_template: "{{ new_buffer.endswith(code | trim) }}"
    then:

      - service: input_boolean.turn_on
        target:
          entity_id: !input unlock_output

      - delay: !input unlock_time

      - service: input_boolean.turn_off
        target:
          entity_id: !input unlock_output

      - service: input_text.set_value
        target:
          entity_id: !input keypad_buffer
        data:
          value: ""

      - service: input_number.set_value
        target:
          entity_id: !input fail_counter
        data:
          value: 0

      - stop: "Code accepted"

################################################
# FAILURE
################################################

  - if:
      - condition: template
        value_template: >
          {{ new_buffer | length >= code | length }}
    then:

      - service: input_number.set_value
        target:
          entity_id: !input fail_counter
        data:
          value: "{{ fails + 1 }}"

      - service: input_text.set_value
        target:
          entity_id: !input keypad_buffer
        data:
          value: ""

################################################
# LOCKOUT
################################################

      - if:
          - condition: template
            value_template: "{{ fails + 1 >= 3 }}"
        then:

          - delay: !input lockout_time

          - service: input_number.set_value
            target:
              entity_id: !input fail_counter
            data:
              value: 0


################################################
# AUTO RESET AFTER 10s
################################################

  - wait_for_trigger:
      - platform: state
        entity_id:
          - !input button_one
          - !input button_two
          - !input button_three
          - !input button_four
        to: "on"
    timeout: "00:00:10"

  - if:
      - condition: template
        value_template: "{{ wait.trigger is none }}"
    then:

      - service: input_text.set_value
        target:
          entity_id: !input keypad_buffer
        data:
          value: ""
