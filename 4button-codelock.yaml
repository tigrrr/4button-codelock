blueprint:
  name: Secure 4 Button Keypad With Telegram Alert
  description: >
    Rolling keypad cipher using 4 buttons.
    Supports repeated digits, timeout reset, and lockout after 3 failures.
  domain: automation

  input:

    button_one:
      name: Button 1
      selector:
        entity:
          domain: binary_sensor

    button_two:
      name: Button 2
      selector:
        entity:
          domain: binary_sensor

    button_three:
      name: Button 3
      selector:
        entity:
          domain: binary_sensor

    button_four:
      name: Button 4
      selector:
        entity:
          domain: binary_sensor

    keypad_code:
      name: Unlock Code
      description: Use digits 1-4
      default: "1234"
      selector:
        text:

    unlock_entity:
      name: Unlock Entity
      selector:
        entity:
          domain: input_boolean

    unlock_time:
      name: Unlock duration
      default: 60
      selector:
        number:
          min: 5
          max: 300
          step: 1

    lockout_time:
      name: Lockout duration
      default: 120
      selector:
        number:
          min: 10
          max: 600
          step: 10


mode: restart

trigger:

  - platform: state
    entity_id: !input button_one
    from: "off"
    to: "on"
    id: b1

  - platform: state
    entity_id: !input button_two
    from: "off"
    to: "on"
    id: b2

  - platform: state
    entity_id: !input button_three
    from: "off"
    to: "on"
    id: b3

  - platform: state
    entity_id: !input button_four
    from: "off"
    to: "on"
    id: b4


variables:

  code: !input keypad_code

  digit: >
    {% if trigger.id == 'b1' %}1
    {% elif trigger.id == 'b2' %}2
    {% elif trigger.id == 'b3' %}3
    {% elif trigger.id == 'b4' %}4
    {% endif %}

action:

  - variables:
      seq: "{{ (seq | default('')) + digit }}"
      fails: "{{ fails | default(0) }}"

################################################
# RESET AFTER 13s INACTIVITY
################################################

  - wait_for_trigger:
      - platform: state
        entity_id:
          - !input button_one
          - !input button_two
          - !input button_three
          - !input button_four
        from: "off"
        to: "on"
    timeout: "00:00:13"
    continue_on_timeout: true

  - if:
      - "{{ wait.trigger is none }}"
    then:
      - variables:
          seq: ""


################################################
# SUCCESS
################################################

  - choose:

      - conditions:
          - "{{ seq.endswith(code) }}"
        sequence:

          - service: input_boolean.turn_on
            target:
              entity_id: !input unlock_entity

          - delay: !input unlock_time

          - service: input_boolean.turn_off
            target:
              entity_id: !input unlock_entity

          - variables:
              seq: ""
              fails: 0


################################################
# FAILURE DETECTION
################################################

      - conditions:
          - "{{ not code.startswith(seq) }}"
        sequence:

          - variables:
              seq: ""
              fails: "{{ fails + 1 }}"

################################################
# LOCKOUT
################################################

          - if:
              - "{{ fails >= 3 }}"
            then:

              - delay: !input lockout_time

              - variables:
                  fails: 0
