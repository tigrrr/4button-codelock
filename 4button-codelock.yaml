blueprint:
  name: Reliable 4 Button Keypad With Lockout
  description: >
    4-button keypad with repeated digits, helper-based buffer,
    13-second reset, and lockout after 3 failed attempts.
  domain: automation
  homeassistant:
    min_version: 2024.6.0

  input:
    button_one:
      name: Button 1
      selector:
        entity:
          filter:
            - domain: binary_sensor
          multiple: false

    button_two:
      name: Button 2
      selector:
        entity:
          filter:
            - domain: binary_sensor
          multiple: false

    button_three:
      name: Button 3
      selector:
        entity:
          filter:
            - domain: binary_sensor
          multiple: false

    button_four:
      name: Button 4
      selector:
        entity:
          filter:
            - domain: binary_sensor
          multiple: false

    keypad_code:
      name: Unlock code
      description: Use digits 1-4, for example 1234 or 1122
      default: "1234"
      selector:
        text:

    keypad_buffer:
      name: Keypad buffer helper
      selector:
        entity:
          filter:
            - domain: input_text
          multiple: false

    fail_counter:
      name: Fail counter helper
      selector:
        entity:
          filter:
            - domain: input_number
          multiple: false

    unlock_output:
      name: Unlock output
      selector:
        entity:
          filter:
            - domain: input_boolean
          multiple: false

    unlock_time:
      name: Unlock duration
      default: 10
      selector:
        number:
          min: 1
          max: 120
          step: 1
          mode: slider

    lockout_time:
      name: Lockout duration
      default: 60
      selector:
        number:
          min: 10
          max: 600
          step: 5
          mode: slider

triggers:
  - trigger: state
    entity_id: !input button_one
    from: "off"
    to: "on"
    id: b1

  - trigger: state
    entity_id: !input button_two
    from: "off"
    to: "on"
    id: b2

  - trigger: state
    entity_id: !input button_three
    from: "off"
    to: "on"
    id: b3

  - trigger: state
    entity_id: !input button_four
    from: "off"
    to: "on"
    id: b4

variables:
  buffer_ent: !input keypad_buffer
  fail_ent: !input fail_counter
  unlock_ent: !input unlock_output
  code: !input keypad_code

  digit: >-
    {% if trigger.id == 'b1' %}1
    {% elif trigger.id == 'b2' %}2
    {% elif trigger.id == 'b3' %}3
    {% elif trigger.id == 'b4' %}4
    {% else %}{% endif %}

  current_buffer: "{{ states(buffer_ent) | string }}"
  code_length: "{{ code | length }}"
  new_buffer: "{{ (current_buffer ~ digit)[-20:] }}"
  fails: "{{ states(fail_ent) | int(0) }}"

conditions: []

actions:
  - alias: Stop immediately if already locked out
    if:
      - condition: template
        value_template: "{{ fails >= 3 }}"
    then:
      - stop: Locked out

  - alias: Append pressed digit to buffer
    action: input_text.set_value
    target:
      entity_id: !input keypad_buffer
    data:
      value: "{{ new_buffer }}"

  - alias: Check keypad result
    choose:
      - alias: Correct code entered
        conditions:
          - condition: template
            value_template: "{{ new_buffer.endswith(code) }}"
        sequence:
          - alias: Turn output on
            action: input_boolean.turn_on
            target:
              entity_id: !input unlock_output

          - alias: Hold output on
            delay:
              seconds: !input unlock_time

          - alias: Turn output off
            action: input_boolean.turn_off
            target:
              entity_id: !input unlock_output

          - alias: Clear buffer after success
            action: input_text.set_value
            target:
              entity_id: !input keypad_buffer
            data:
              value: ""

          - alias: Reset fail counter after success
            action: input_number.set_value
            target:
              entity_id: !input fail_counter
            data:
              value: 0

      - alias: Wrong full-length attempt
        conditions:
          - condition: template
            value_template: >-
              {{ (new_buffer | length) >= (code | length)
                 and not new_buffer.endswith(code) }}
        sequence:
          - alias: Increment fail counter
            action: input_number.set_value
            target:
              entity_id: !input fail_counter
            data:
              value: "{{ fails + 1 }}"

          - alias: Clear buffer after wrong attempt
            action: input_text.set_value
            target:
              entity_id: !input keypad_buffer
            data:
              value: ""

          - alias: Lock out after 3 failed attempts
            if:
              - condition: template
                value_template: "{{ (fails + 1) >= 3 }}"
            then:
              - delay:
                  seconds: !input lockout_time

              - alias: Reset fail counter after lockout
                action: input_number.set_value
                target:
                  entity_id: !input fail_counter
                data:
                  value: 0

mode: queued
max: 10
max_exceeded: silent
