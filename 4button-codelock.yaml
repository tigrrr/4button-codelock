blueprint:
  name: Reliable 4 Button Keypad
  description: 4 button keypad with rolling detection and lockout
  domain: automation

  input:

    button_one:
      name: Button 1
      selector:
        entity:
          domain: binary_sensor

    button_two:
      name: Button 2
      selector:
        entity:
          domain: binary_sensor

    button_three:
      name: Button 3
      selector:
        entity:
          domain: binary_sensor

    button_four:
      name: Button 4
      selector:
        entity:
          domain: binary_sensor

    keypad_code:
      name: Unlock Code
      default: "1234"
      selector:
        text:

    keypad_buffer:
      name: Buffer Helper
      selector:
        entity:
          domain: input_text

    fail_counter:
      name: Fail Counter
      selector:
        entity:
          domain: input_number

    unlock_output:
      name: Unlock Output
      selector:
        entity:
          domain: input_boolean

    unlock_time:
      name: Unlock duration
      default: 10
      selector:
        number:
          min: 1
          max: 120
          step: 1

    lockout_time:
      name: Lockout time
      default: 60
      selector:
        number:
          min: 10
          max: 600
          step: 10

mode: restart

trigger:

  - platform: state
    entity_id: !input button_one
    to: "on"
    id: b1

  - platform: state
    entity_id: !input button_two
    to: "on"
    id: b2

  - platform: state
    entity_id: !input button_three
    to: "on"
    id: b3

  - platform: state
    entity_id: !input button_four
    to: "on"
    id: b4

variables:

  buffer_ent: !input keypad_buffer
  fail_ent: !input fail_counter
  code: !input keypad_code

  digit: >
    {% if trigger.id == 'b1' %}1
    {% elif trigger.id == 'b2' %}2
    {% elif trigger.id == 'b3' %}3
    {% elif trigger.id == 'b4' %}4
    {% endif %}

  buffer: "{{ states(buffer_ent) }}"
  new_buffer: "{{ (buffer + digit)[-10:] }}"
  fails: "{{ states(fail_ent) | int }}"

action:

  - service: input_text.set_value
    target:
      entity_id: !input keypad_buffer
    data:
      value: "{{ new_buffer }}"

  - choose:

################################################
# SUCCESS
################################################

      - conditions:
          - condition: template
            value_template: "{{ new_buffer.endswith(code) }}"
        sequence:

          - service: input_boolean.turn_on
            target:
              entity_id: !input unlock_output

          - delay: !input unlock_time

          - service: input_boolean.turn_off
            target:
              entity_id: !input unlock_output

          - service: input_text.set_value
            target:
              entity_id: !input keypad_buffer
            data:
              value: ""

          - service: input_number.set_value
            target:
              entity_id: !input fail_counter
            data:
              value: 0

################################################
# FAILURE
################################################

      - conditions:
          - condition: template
            value_template: >
              {{ new_buffer | length >= code | length and not new_buffer.endswith(code) }}

        sequence:

          - service: input_number.set_value
            target:
              entity_id: !input fail_counter
            data:
              value: "{{ fails + 1 }}"

          - if:
              - condition: template
                value_template: "{{ fails + 1 >= 3 }}"
            then:

              - delay: !input lockout_time

              - service: input_number.set_value
                target:
                  entity_id: !input fail_counter
                data:
                  value: 0
